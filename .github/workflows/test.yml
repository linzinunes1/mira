name: Regression Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    name: Playwright Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Generate missing baseline snapshots
        run: npx playwright test --update-snapshots=missing
        env:
          CI: "true"

      - name: Commit new baselines (linux)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.email "ci@paperclip.ing"
          git config user.name "CI"
          git add tests/
          git diff --staged --quiet || git commit -m "chore: add linux snapshot baselines [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: "true"

      - name: Upload Playwright HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
